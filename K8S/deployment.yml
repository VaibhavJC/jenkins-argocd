apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstar-deployment
spec:
  replicas: 2 # Number of desired replicas
  selector:
    matchLabels:
      app: hotstar
  template:
    metadata:
      labels:
        app: hotstar
    spec:
      containers:
      - name: hotstar
        image: 339712999569.dkr.ecr.us-west-2.amazonaws.com/main:latest
        ports:
        - containerPort: 3000  # Port your application listens on
